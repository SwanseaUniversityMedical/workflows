name: 'Bulk PR and Release Container'
description: 'Builds and releases container images for bulk PR and release workflows.'
inputs:
  name:
    description: "Name of the release asset."
    required: true

  comment-pr:
    description: "PR comment creation and update."
    default: "false"

  comment-release:
    description: "Release comment creation and update."
    default: "true"

  build-file:
    description: "Path to the container file."
    required: true

  build-context:
    description: "Path to the build root dir."
    default: '.'

  build-args:
    description: "KEY=VALUE build args as a multiline string."
    default: ''

  build-secrets:
    description: "KEY=VALUE build secrets as a multiline string."
    default: ''

  build-secret-envs:
    description: "KEY=VALUE build secrets from env vars as a multiline string."
    default: ''

  build-secret-files:
    description: "KEY=VALUE build secrets from files as a multiline string."
    default: ''

  build-target:
    description: "String name of the Dockerfile stage to build. Last stage if blank."
    default: ''

  nuget-config:
    description: "Contents of a NuGet.Config file to inject into the build context."
    default: ''

  test-flags:
    description: "Arguments passed to docker run."
    default: ''

  test-args:
    description: "Arguments passed to the container."
    default: ''

  registry:
    description: "URL of the container registry."
    required: true

  registry-user:
    description: "Username for the container registry."
    required: true

  registry-repo:
    description: "Repo within container registry project."
    required: true

  release-info:
    description: "Release information json blob."
    required: true

  registry-extra-tag-command:
    description: "Extra tag to push release container."
    default: ''

  notation-cert:
    description: "Public key for notation signing images."
    required: true

  platforms:
    description: "Comma-separated list of platforms to build for (e.g., linux/amd64,linux/arm64)"
    default: "linux/amd64"

  registry-token:
    description: "Authentication token for the container registry."
    required: true

  notation-key:
    description: "Private key for notation signing images."
    required: false

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: prepare build context with nuget config override
      id: prepare-build-context
      shell: bash
      env:
        NUGET_CONFIG_CONTENT: ${{ inputs.nuget-config }}
        ORIGINAL_BUILD_CONTEXT: ${{ inputs.build-context }}
      run: |
        ORIGINAL_CONTEXT_PATH="$GITHUB_WORKSPACE/$ORIGINAL_BUILD_CONTEXT"

        if [[ -z "${NUGET_CONFIG_CONTENT:-}" ]]; then
          echo "build-context=$ORIGINAL_CONTEXT_PATH" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        OVERRIDE_CONTEXT_PATH="$RUNNER_TEMP/container-build-context"
        rm -rf "$OVERRIDE_CONTEXT_PATH"
        mkdir -p "$OVERRIDE_CONTEXT_PATH"

        cp -a "$ORIGINAL_CONTEXT_PATH"/. "$OVERRIDE_CONTEXT_PATH"/

        printf '%s\n' "$NUGET_CONFIG_CONTENT" > "$OVERRIDE_CONTEXT_PATH/NuGet.Config"
        printf '%s\n' "$NUGET_CONFIG_CONTENT" > "$OVERRIDE_CONTEXT_PATH/nuget.config"

        echo "build-context=$OVERRIDE_CONTEXT_PATH" >> "$GITHUB_OUTPUT"

    - if: github.event_name == 'pull_request'
      uses: SwanseaUniversityMedical/workflows/.github/actions/pr-container@v3.0.0-pr-container-action
      with:
        name: ${{ inputs.name }}
        comment-enabled: ${{ inputs.comment-pr }}
        label-eligible: 'false'
        registry: ${{ inputs.registry }}
        registry-user: ${{ inputs.registry-user }}
        registry-repo: ${{ inputs.registry-repo }}
        registry-token: ${{ inputs.registry-token }}
        build-file: ${{ inputs.build-file }}
        build-context: ${{ steps.prepare-build-context.outputs.build-context }}
        build-args: ${{ inputs.build-args }}
        build-secrets: ${{ inputs.build-secrets }}
        build-secret-envs: ${{ inputs.build-secret-envs }}
        build-secret-files: ${{ inputs.build-secret-files }}
        build-target: ${{ inputs.build-target }}
        test-flags: ${{ inputs.test-flags }}
        test-args: ${{ inputs.test-args }}
        platforms: ${{ inputs.platforms }}
        notation-cert: ${{ inputs.notation-cert }}
        notation-key: ${{ inputs.notation-key }}


    - if: github.event_name == 'push'
      uses: SwanseaUniversityMedical/workflows/.github/actions/bulk-release-container@v2.0.0-bulk-release-container-action
      with:
        name: ${{ inputs.name }}
        comment-enabled: ${{ inputs.comment-release }}
        registry: ${{ inputs.registry }}
        registry-user: ${{ inputs.registry-user }}
        registry-repo: ${{ inputs.registry-repo }}
        registry-token: ${{ inputs.registry-token }}
        registry-extra-tag-command: ${{ inputs.registry-extra-tag-command }}
        release-info: ${{ inputs.release-info }}
        build-file: ${{ inputs.build-file }}
        build-context: ${{ steps.prepare-build-context.outputs.build-context }}
        build-args: ${{ inputs.build-args }}
        build-secrets: ${{ inputs.build-secrets }}
        build-secret-envs: ${{ inputs.build-secret-envs }}
        build-secret-files: ${{ inputs.build-secret-files }}
        build-target: ${{ inputs.build-target }}
        test-flags: ${{ inputs.test-flags }}
        test-args: ${{ inputs.test-args }}
        platforms: ${{ inputs.platforms }}
        notation-cert: ${{ inputs.notation-cert }}
        notation-key: ${{ inputs.notation-key }}


        