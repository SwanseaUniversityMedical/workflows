name: 'Bulk Release Chart'
inputs:
  name:
    description: "Name of the release asset."
    required: true

  comment-header:
    description: "Header line for the Release summary."
    default: ":rocket: :anchor: Build Release Chart"

  comment-enabled:
    description: "Release comment creation and update."
    default: "true"

  chart:
    description: "Path to the helm chart."
    required: true

  test-command:
    description: "Command to test the chart named $CHART."
    default: ''

  registry:
    description: "URL of the chart registry."
    required: true

  registry-user:
    description: "Username for the chart registry."
    required: true

  registry-project:
    description: "Project within chart registry."
    required: true

  registry-repo:
    description: "Repo within chart registry project."
    required: true

  release-info:
    description: "Release information json blob."
    required: true

  notation-cert:
    description: "Public key for notation signing images."
    required: true

  registry-token:
    description: "Authentication token for the chart registry."
    required: true

  notation-key:
    description: "Private key for notation signing charts."
    required: false


runs:
  using: "composite"
  steps:
    - name: Setup Notation
      uses: notaryproject/notation-action/setup@b6fee73110795d6793253c673bd723f12bcf9bbb # v1.2.2
      with:
        version: "1.3.1"

    - name: Generate notation key config
      shell: bash
      run: |
        set -euo pipefail

        BASE_DIR="$HOME/.config/notation/localkeys"
        mkdir -p "$BASE_DIR"

        CERT_FILE="$BASE_DIR/notation.crt"
        printf "%s" "$NOTATION_CERT" > "$CERT_FILE"

        KEY_FILE="$BASE_DIR/notation.key"
        printf "%s" "$NOTATION_KEY" > "$KEY_FILE"
        chmod 600 "$KEY_FILE"

        cat > "$BASE_DIR/config.json" <<EOF
        {
          "default": "chi.swan.ac.uk",
          "keys": [
            {
              "name": "chi.swan.ac.uk",
              "keyPath": "$KEY_FILE",
              "certPath": "$CERT_FILE"
            }
          ]
        }
        EOF
      env:
        NOTATION_CERT: ${{ inputs.notation-cert }}
        NOTATION_KEY: ${{ inputs.notation-key }}

    - name: login to container registry for notation
      if: contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published) && inputs.notation-cert != ''
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-user }}
        password: ${{ inputs.registry-token }}

    - name: install helm
      if: contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published)
      uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      with:
        version: 'v3.15.1'

    - name: login to chart registry
      if: contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published)
      shell: bash
      run: |
        helm registry login \
          --username '${{ inputs.registry-user }}' \
          --password '${{ inputs.registry-token }}' \
          ${{ inputs.registry }}

    - name: create chart repo url
      if: contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published)
      shell: bash
      run: |
        CHART_PROJECT="${{ inputs.registry }}/${{ inputs.registry-project }}/chart"
        echo "CHART_PROJECT=$CHART_PROJECT" >> $GITHUB_ENV
        echo "CHART_REPO=$CHART_PROJECT/${{ inputs.registry-repo }}" >> $GITHUB_ENV

    - name: new release
      if: contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published)
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: |
          #### ${{ inputs.comment-header }} - ${{ inputs.name }} - :label: Commit: ${{ github.sha }}
          :label: New version will be ${{ fromJSON(inputs.release-info).release-version }}  

    - name: skipped release
      if: ${{ !contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published) }}
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: |
          #### ${{ inputs.comment-header }} - ${{ inputs.name }} - :label: Commit: ${{ github.sha }}  
          :desert_island: Skipping release!

    - name: create tags
      if: contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published)
      shell: bash
      run: |
        echo "RELEASE_TAG=${{ fromJSON(inputs.release-info).release-version }}" >> $GITHUB_ENV
        echo "RC_TAG=${{ fromJSON(inputs.release-info).release-version }}-rc" >> $GITHUB_ENV

    - name: build release candidate chart
      id: helm-rc
      if: contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published)
      shell: bash
      run: |
        helm dependency update ${{ inputs.chart }}
        helm package ${{ inputs.chart }} --version ${{ env.RC_TAG }}
        helm push ${{ inputs.registry-repo }}-${{ env.RC_TAG }}.tgz oci://${{ env.CHART_PROJECT }}

    - name: build success
      if: steps.helm-rc.outcome == 'success'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: |
          ```
          ${{ env.CHART_REPO }}:${{ env.RC_TAG }}
          ```
          :hammer_and_wrench: Build Success  

    - name: build failure
      if: failure() && steps.helm-rc.outcome == 'failure'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: ":x: Build Failure"

    - name: notation release candidate
      id: notation-rc
      if: inputs.notation-cert != '' && steps.helm-rc.outcome == 'success'
      shell: bash
      run: |
        notation sign "${CHART_REPO}:${RC_TAG}"

    - name: notation success
      if: steps.notation-rc.outcome == 'success'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: ":black_nib: Notation Success  "

    - name: notation error
      if: failure() && steps.notation-rc.outcome == 'failure'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: ":x: Notation Failure"

    - name: test release candidate
      id: test
      if: inputs.test-command != '' && steps.helm-rc.outcome == 'success' && steps.notation-rc.outcome != 'failure'
      shell: bash
      run: |
        set -x
        CHART="${{ inputs.registry-repo }}-${{ env.RC_TAG}}.tgz"
        ${{ inputs.test-command }}

    - name: test success
      if: steps.test.outcome == 'success'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: ":eyes: Test Success  "

    - name: test error
      if: failure() && steps.test.outcome == 'failure'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: ":x: Test Failure"

    - name: build release chart
      id: helm-release
      if: steps.helm-rc.outcome == 'success' && steps.notation-rc.outcome != 'failure' && steps.test.outcome != 'failure'
      shell: bash
      run: |
        helm package ${{ inputs.chart }} --version ${{ env.RELEASE_TAG }}
        helm push ${{ inputs.registry-repo }}-${{ env.RELEASE_TAG }}.tgz oci://${{ env.CHART_PROJECT }}

    - name: build success
      if: steps.helm-release.outcome == 'success'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: |
          ```
          ${{ env.CHART_REPO }}:${{ env.RELEASE_TAG }}
          ```
          :hammer_and_wrench: Build Success  

    - name: build failure
      if: failure() && steps.helm-release.outcome == 'failure'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: ":x: Build Failure"

    - name: notation release
      id: notation-release
      if: inputs.notation-cert != '' && steps.helm-release.outcome == 'success'
      shell: bash
      run: |
        notation sign "${CHART_REPO}:${RELEASE_TAG}"

    - name: notation success
      if: steps.notation-release.outcome == 'success'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: ":black_nib: Notation Success  "

    - name: notation error
      if: failure() && steps.notation-release.outcome == 'failure'
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: ":x: Notation Failure"

    - name: find pr comment
      uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3.1.0
      if: ${{ inputs.comment-enabled == 'true' && contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published) }}
      id: find-pr-comment
      with:
        issue-number: ${{ fromJSON(inputs.release-info).pr-number }}
        body-includes: ${{ inputs.comment-header }} - ${{ inputs.name }}
        comment-author: "github-actions[bot]"

    - name: comment on release success
      id: release-pr-comment
      if: ${{ inputs.comment-enabled == 'true' && contains(fromJSON('["true"]'), fromJSON(inputs.release-info).new-release-published) }}
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      with:
        comment-id: ${{ steps.find-pr-comment.outputs.comment-id }}
        issue-number: ${{ fromJSON(inputs.release-info).pr-number }}
        edit-mode: replace
        body: |
          #### ${{ inputs.comment-header }} - ${{ inputs.name }} - :label: Commit: ${{ github.sha }} - :gear: Workflow: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          ```
          ${{ fromJSON(inputs.release-info).git-tag }}
          ${{ env.CHART_REPO }}:${{ env.RELEASE_TAG }}
          ```

    - name: error
      if: failure()
      shell: bash
      run: |
        echo "${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"
      env:
        SUMMARY: |
          ---
          :x: An error occurred during execution! Check the workflow run logs for details!
